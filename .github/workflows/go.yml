# This workflow will build a golang project
# For more information see: https://docs.github.com/en/actions/automating-builds-and-tests/building-and-testing-go

name: Go

on:
  push:
    branches: ["**"]
    paths-ignore:
      - "**.md"
      - "docs/**"
      - ".vscode/**"
      - ".github/dependabot.yml"
      - ".env"
      - "docker-compose.yml"
      - "docker/**"
  pull_request:
    paths-ignore:
      - "**.md"
    branches: [main]
  # Allow manually publishing prebuilt protoc-gen plugins for an existing tag
  # (useful to backfill releases for tags created before this workflow existed).
  workflow_dispatch:
    inputs:
      tag:
        description: "Existing tag to publish protoc-gen plugins for (e.g. v1.0.276). Leave empty on push runs."
        required: false
        type: string

env:
  BINARY: "server"
  GO_VERSION: "1.26"
  BUILD_PATH: "./example/server"
  IMAGE_NAME: "ghstahl/fluffycore-example"
  BASE_VERSION: "1.0.0"
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
jobs:
  pre_flight:
    runs-on: ubuntu-latest

    outputs:
      new_tag: ${{ steps.tag_version.outputs.new_tag }}
      changelog: ${{ steps.tag_version.outputs.changelog }}
    steps:
      - name: Establish tags and versions
        id: tag_version
        uses: mathieudutour/github-tag-action@v6.2
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}

  build:
    runs-on: ubuntu-latest
    needs: [pre_flight]
    steps:
      - name: Echo Tags
        run: |
          echo new_tag: ${{needs.pre_flight.outputs.new_tag}} 
          echo changelog: ${{needs.pre_flight.outputs.changelog}}

      - uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: "^${{ env.GO_VERSION }}"

      - name: Build
        run: go build -v ./...

      - name: Test
        run: go test -v ./...

  # Create and post docker image
  build-docker-push-image:
    runs-on: ubuntu-latest
    needs: [pre_flight, build]

    steps:
      - name: Echo Tags
        run: |
          echo new_tag: ${{needs.pre_flight.outputs.new_tag}} 
          echo changelog: ${{needs.pre_flight.outputs.changelog}}

      - uses: actions/checkout@v6
        with:
          submodules: true

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        id: buildx
        uses: docker/setup-buildx-action@v4

      - name: Inspect builder
        run: |
          echo "Name:      ${{ steps.buildx.outputs.name }}"
          echo "Endpoint:  ${{ steps.buildx.outputs.endpoint }}"
          echo "Status:    ${{ steps.buildx.outputs.status }}"
          echo "Flags:     ${{ steps.buildx.outputs.flags }}"
          echo "Platforms: ${{ steps.buildx.outputs.platforms }}"

      - name: Get the version
        id: get_version
        run: echo ::set-output name=VERSION::$(echo $GITHUB_REF | cut -d / -f 3)

      - name: Login to DockerHub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKER_HUB_USERNAME }}
          password: ${{ secrets.DOCKER_HUB_ACCESS_TOKEN }}

      - name: Establish Versioning, Tags, and Labels
        id: vtl
        uses: mapped/action-vtl@latest
        with:
          baseVersion: ${{ env.BASE_VERSION }}
          gitHubToken: ${{ secrets.GITHUB_TOKEN }}
          dockerImage: ${{ env.IMAGE_NAME }}

      - name: Build and push Base
        id: docker_build
        uses: docker/build-push-action@v7
        env:
          version: ${{ steps.vtl.outputs.ver_semVerNoMeta }}
          date: ${{ steps.vtl.outputs.ver_created }}
          commit: ${{ github.sha }}
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          file: ./build/Dockerfile
          push: ${{ steps.vtl.outputs.docker_push }}
          tags: ${{ steps.vtl.outputs.docker_tags }}
          labels: ${{ steps.vtl.outputs.oci_labels }}
          build-args: |
            version
            date
            commit

      - name: Image digest docker_build
        run: echo ${{ steps.docker_build.outputs.digest }}

  # Build prebuilt protoc-gen plugins and attach them as GitHub Release assets.
  # Consumers (e.g. mapped/protorepo CI) download these instead of running
  # `go install`, which is very slow for the heavyweight nats plugin.
  release-protoc-plugins:
    runs-on: ubuntu-latest
    needs: [pre_flight, build]
    if: |
      (github.event_name == 'push' && github.ref == 'refs/heads/main' && needs.pre_flight.outputs.new_tag != '')
      || github.event_name == 'workflow_dispatch'
    permissions:
      contents: write
    steps:
      - name: Resolve target tag
        id: tag
        run: |
          set -e
          if [ -n "${{ github.event.inputs.tag }}" ]; then
            TAG="${{ github.event.inputs.tag }}"
          else
            TAG="${{ needs.pre_flight.outputs.new_tag }}"
          fi
          if [ -z "$TAG" ]; then
            echo "No tag resolved; nothing to release." >&2
            exit 1
          fi
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"

      - uses: actions/checkout@v6
        with:
          ref: ${{ steps.tag.outputs.tag }}

      - uses: actions/setup-go@v6
        with:
          go-version: "^${{ env.GO_VERSION }}"

      - name: Build protoc-gen plugin binaries
        run: |
          set -e
          mkdir -p dist
          PLUGINS="protoc-gen-go-fluffycore-di protoc-gen-go-fluffycore-nats"
          # linux/amd64 covers GitHub-hosted runners (the primary consumer).
          # darwin/{amd64,arm64} and linux/arm64 are added so local devs and
          # other CI environments can use the same release assets.
          PLATFORMS="linux/amd64 linux/arm64 darwin/amd64 darwin/arm64"
          for plugin in $PLUGINS; do
            for platform in $PLATFORMS; do
              GOOS="${platform%/*}"
              GOARCH="${platform#*/}"
              OUT="dist/${plugin}-${GOOS}-${GOARCH}"
              echo "Building $OUT"
              GOOS="$GOOS" GOARCH="$GOARCH" CGO_ENABLED=0 \
                go build -trimpath -ldflags="-s -w" \
                -o "$OUT" \
                "./protoc-gen-go-fluffycore-di/cmd/${plugin}"
            done
          done
          ls -lh dist

      - name: Upload binaries to GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ steps.tag.outputs.tag }}
          files: dist/*
          fail_on_unmatched_files: true
